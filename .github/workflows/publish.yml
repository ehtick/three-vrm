name: Publish to npmjs

on:
  # Who has permission to workflow_dispatch
  # https://github.com/orgs/community/discussions/26622
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        type: string
      distTag:
        description: 'Used as lerna publish --dist-tag'
        default: 'latest'
        required: true
        type: string

jobs:
  publish:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10.33.0
        run_install: false
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: './.node-version'
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'
    - name: Fetch Deps
      run: pnpm install --frozen-lockfile

    - name: Set git username and email
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "actions-user"

    - name: Set package version
      run: |
        pnpm lerna version ${{ github.event.inputs.version }} --exact --no-push --yes
        pnpm lerna publish from-git -y --dist-tag ${{ github.event.inputs.distTag }}
      env:
        NPM_CONFIG_PROVENANCE: true

    - name: Git push version up commits
      run: |
        git push origin --tags ${{ github.ref_name }}

    - name: Upload Builds
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: |
          packages/*/lib/
          packages/*/types/
