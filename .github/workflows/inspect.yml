name: Inspect

on: push

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10.33.0
        run_install: false
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: './.node-version'
        cache: 'pnpm'
    - name: Fetch Deps
      run: pnpm install --frozen-lockfile
    - name: Build
      run: pnpm build
    - name: Upload Builds
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: |
          packages/*/lib/
          packages/*/types/

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10.33.0
        run_install: false
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: './.node-version'
        cache: 'pnpm'
    - name: Fetch Deps
      run: pnpm install --frozen-lockfile
    - name: Download Builds
      uses: actions/download-artifact@v4
      with:
        name: build
        path: packages
    - name: Lint
      run: pnpm lint

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10.33.0
        run_install: false
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: './.node-version'
        cache: 'pnpm'
    - name: Fetch Deps
      run: pnpm install --frozen-lockfile
    - name: Download Builds
      uses: actions/download-artifact@v4
      with:
        name: build
        path: packages
    - name: Test
      run: pnpm test

  docs:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10.33.0
        run_install: false
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: './.node-version'
        cache: 'pnpm'
    - name: Fetch Deps
      run: pnpm install --frozen-lockfile
    - name: Download Builds
      uses: actions/download-artifact@v4
      with:
        name: build
        path: packages
    - name: Build Docs
      run: pnpm docs
    - name: Upload Docs
      uses: actions/upload-artifact@v4
      with:
        name: docs
        path: |
          docs

  docs-legacy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10.33.0
        run_install: false
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: './.node-version'
        cache: 'pnpm'
    - name: Fetch Deps
      run: pnpm install --frozen-lockfile
    - name: Download Builds
      uses: actions/download-artifact@v4
      with:
        name: build
        path: packages
    - name: Build Docs
      run: DOCS_ROOT='https://pixiv.github.io/three-vrm/docs' pnpm docs-legacy
    - name: Upload Docs
      uses: actions/upload-artifact@v4
      with:
        name: docs-legacy
        path: |
          packages/*/docs/

  gh-pages:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/release' }}
    needs:
    - build
    - docs
    - docs-legacy
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10.33.0
        run_install: false
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: './.node-version'
        cache: 'pnpm'
    - name: Fetch Deps
      run: pnpm install --frozen-lockfile
    - name: Download Builds
      uses: actions/download-artifact@v4
      with:
        name: build
        path: public/packages
    - name: Download Docs
      uses: actions/download-artifact@v4
      with:
        name: docs
        path: public/docs
    - name: Download Docs (legacy)
      uses: actions/download-artifact@v4
      with:
        name: docs-legacy
        path: public/packages
    - name: Copy Examples
      run: |
        for d in packages/*; do
          if [[ -e "$d/examples" ]]; then
            mkdir -p public/$d
            cp -r $d/examples public/$d
          fi
        done
    - name: Deploy to gh-pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: public
